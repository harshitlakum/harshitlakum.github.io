<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Flowchart Display</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f4; 
            margin: 0;
            padding: 0;
            overflow: auto; /* Enable scrolling */
        }
        .container {
            background-color: white;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            width: auto;
            max-width: 95%; /* Adjusted for better responsiveness */
            margin: 20px auto; /* Centered with space */
            text-align: center;
        }
        img {
            max-width: 100%; /* Image will scale to container width */
            height: auto;
            border-radius: 4px;
            margin-top: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Whole Process Flowchart</h1>
    <p>This is the whole process flowchart depicting the system for reading QR codes from ceramic-on-glass sheets using high-resolution cameras.</p>
    <img src="process_flowchart.png" alt="Process Flowchart">
</div>
</body>
</html>
